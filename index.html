<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menú Global Netine | IED María Alfaro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [contenteditable="true"]:focus { 
            outline: 3px solid #c2410c; 
            background: #fff; 
            padding: 4px; 
            border-radius: 8px; 
        }
        .tab-active { 
            border-bottom: 4px solid #c2410c; 
            color: #c2410c; 
            font-weight: 900; 
        }
        .card-menu {
            transition: all 0.3s ease;
        }
        .card-menu:hover {
            transform: translateY(-5px);
            border-color: #fb923c;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32">

<header class="bg-white shadow-md py-8 text-center border-b-8 border-orange-700">
    <h1 class="text-4xl font-black text-slate-900 tracking-tight">
        PLATOS <span class="text-orange-700 italic">NETINE</span>
    </h1>
    <p id="status" class="text-sm font-bold text-slate-400 mt-2 uppercase tracking-widest">
        🔄 Sincronizando nube...
    </p>
</header>

<nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b">
    <div class="flex justify-center gap-10 p-4">
        <button onclick="showCategory('salados')" id="btn-salados" class="tab-btn tab-active text-lg uppercase">🥘 Salados</button>
        <button onclick="showCategory('postres')" id="btn-postres" class="tab-btn text-slate-400 text-lg uppercase">🍰 Postres</button>
        <button onclick="showCategory('bebidas')" id="btn-bebidas" class="tab-btn text-slate-400 text-lg uppercase">🍹 Bebidas</button>
    </div>
</nav>

<main id="container" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-10">
    </main>

<div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md border-t p-6 flex justify-center shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
    <button onclick="saveAll()" class="bg-orange-700 hover:bg-orange-800 text-white font-black text-xl px-12 py-5 rounded-2xl shadow-2xl transition-all active:scale-90 flex items-center gap-3">
        <span>🌍</span> GUARDAR CAMBIOS PARA TODOS
    </button>
</div>

<script>
    // --- CONFIGURACIÓN DE TU NUBE ---
    const SB_URL = 'https://sexadxzqssmhvbzjtupd.supabase.co';
    const SB_KEY = 'sb_publishable_iV2bAQ3LGo1NbaWG-gdSRg_Z9uWuLeE'; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentCat = 'salados';
    const config = { salados: 40, postres: 30, bebidas: 30 };

    // Función para descargar datos de la nube
    async function loadData() {
        const status = document.getElementById('status');
        const { data, error } = await _supabase.from('menu_platos').select('*');
        
        if (data) {
            data.forEach(item => {
                const el = document.getElementById(item.id_plato);
                if (el) el.innerText = item.contenido;
            });
            status.innerText = "✅ Menú Global Conectado";
            status.className = "text-sm font-bold text-green-600 mt-2 uppercase tracking-widest";
        }
    }

    // Función para subir cambios a la nube
    async function saveAll() {
        const status = document.getElementById('status');
        status.innerText = "⏳ Subiendo datos a la nube...";
        
        const elements = document.querySelectorAll('[contenteditable="true"]');
        const updates = Array.from(elements).map(el => ({
            id_plato: el.id,
            contenido: el.innerText
        }));

        const { error } = await _supabase.from('menu_platos').upsert(updates);
        
        if (!error) {
            alert("¡Cambios guardados! Ahora todos los que visiten la página verán tu información.");
            status.innerText = "✅ Cambios publicados con éxito";
        } else {
            console.error(error);
            alert("Hubo un error al guardar. Revisa que hayas creado la tabla en Supabase.");
        }
    }

    // Función para dibujar los platos en pantalla
    function render() {
        const cont = document.getElementById('container');
        cont.innerHTML = '';
        const limit = config[currentCat];

        for (let i = 1; i <= limit; i++) {
            const id = `${currentCat}-${i}`;
            cont.innerHTML += `
                <div class="card-menu bg-white p-8 rounded-3xl shadow-sm border-2 border-slate-100 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-2 h-full bg-orange-700"></div>
                    <span class="text-xs font-black text-orange-600 uppercase tracking-tighter italic">N#${i} - ${currentCat}</span>
                    <h3 id="title-${id}" contenteditable="true" class="text-2xl font-black text-slate-800 mt-2 leading-tight">Nombre del Plato</h3>
                    <p id="desc-${id}" contenteditable="true" class="text-slate-500 mt-4 text-sm leading-relaxed border-t pt-4 border-slate-50 italic">
                        Haz clic aquí para escribir los ingredientes y el precio...
                    </p>
                </div>`;
        }
        loadData(); // Después de dibujar, traer los textos guardados
    }

    // Función para cambiar entre pestañas
    function showCategory(cat) {
        currentCat = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-slate-400'));
        document.getElementById(`btn-${cat}`).classList.add('tab-active');
        render();
    }

    // Iniciar la página
    render();
</script>
</body>
</html>
