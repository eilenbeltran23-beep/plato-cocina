<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plato Cocina y se Divierte | IED María Alfaro de Ospino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#E9723A', secondary: '#133959', neutralBg: '#F9F5F1', pTag: '#AE8B69' },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-neutralBg min-h-screen pb-32 font-sans">

<header class="py-10 text-center px-4 max-w-6xl mx-auto border-b border-gray-200">
    <div class="inline-flex items-center gap-2 border border-gray-200 bg-white rounded-full px-4 py-1.5 shadow-sm mb-6 text-sm font-semibold tracking-wide text-pTag">
        <span class="w-2.5 h-2.5 rounded-full bg-pTag"></span> MAGDALENA · COLOMBIA
    </div>
    <h1 class="text-4xl md:text-5xl font-black text-secondary leading-tight max-w-4xl mx-auto mb-4">
        Institución Educativa Técnica Departamental <span class="block text-[#C2410C]">“María Alfaro de Ospino”</span>
    </h1>
</header>

<section class="bg-primary pt-16 pb-20 px-6">
    <div class="max-w-6xl mx-auto text-center">
        <div class="inline-block bg-white/20 border border-white/30 text-white rounded-full px-5 py-2.5 font-bold uppercase tracking-widest text-xs mb-8">PROYECTO CULTURAL</div>
        <h2 class="text-6xl md:text-7xl font-black text-white leading-tight font-serif mb-4 tracking-tighter">
            Plato cocina <span class="block text-secondary text-5xl md:text-6xl">y se divierte</span>
        </h2>
    </div>
</section>

<nav class="bg-white sticky top-0 z-50 shadow-md border-b-2 border-primary mt-[-30px] rounded-t-3xl max-w-6xl mx-auto">
    <div class="flex justify-center gap-10 p-5">
        <button onclick="showCategory('salados')" id="btn-salados" class="font-bold text-primary border-b-4 border-primary pb-1">🥘 Salados</button>
        <button onclick="showCategory('postres')" id="btn-postres" class="font-bold text-gray-400">🍰 Postres</button>
        <button onclick="showCategory('bebidas')" id="btn-bebidas" class="font-bold text-gray-400">🍹 Bebidas</button>
    </div>
</nav>

<main id="container" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12 max-w-6xl"></main>

<div class="fixed top-6 right-6 z-50">
    <button onclick="saveAll()" class="bg-secondary hover:bg-black text-white font-bold text-sm px-8 py-3 rounded-full shadow-2xl transition-all flex items-center gap-2">
        <span>💾</span> GUARDAR CAMBIOS GLOBALMENTE
    </button>
</div>

<script>
    const SB_URL = 'https://sexadxzqssmhvbzjtupd.supabase.co';
    const SB_KEY = 'sb_publishable_iV2bAQ3LGo1NbaWG-gdSRg_Z9uWuLeE'; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentCat = 'salados';
    const config = { salados: 40, postres: 30, bebidas: 30 };

    async function loadData() {
        const { data } = await _supabase.from('menu_platos').select('*');
        if (data) {
            data.forEach(item => {
                const el = document.getElementById(item.id_plato);
                if (el) {
                    if (el.tagName === 'IMG') {
                        el.src = item.contenido || 'https://via.placeholder.com/400?text=Sube+tu+Foto';
                    } else {
                        el.innerText = item.contenido;
                    }
                }
            });
        }
    }

    async function saveAll() {
        const elements = document.querySelectorAll('[data-db]');
        const updates = Array.from(elements).map(el => ({
            id_plato: el.id,
            contenido: el.tagName === 'IMG' ? el.src : el.innerText
        }));

        const { error } = await _supabase.from('menu_platos').upsert(updates);
        if (!error) alert("¡Guardado con éxito! Las imágenes y textos ya están en la nube.");
    }

    function updateImage(id, url) {
        if(url) document.getElementById(id).src = url;
    }

    function render() {
        const cont = document.getElementById('container');
        cont.innerHTML = '';
        const limit = config[currentCat];

        for (let i = 1; i <= limit; i++) {
            const id = `${currentCat}-${i}`;
            cont.innerHTML += `
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all">
                    <div class="relative h-48 bg-gray-200">
                        <img id="img-${id}" data-db src="https://via.placeholder.com/400?text=Sube+tu+Foto" class="w-full h-full object-cover">
                        <input type="text" placeholder="Pega URL de imagen aquí" 
                               onchange="updateImage('img-${id}', this.value)"
                               class="absolute bottom-2 left-2 right-2 p-1 text-[10px] rounded border bg-white/80 opacity-0 hover:opacity-100 transition-opacity">
                    </div>
                    <div class="p-6">
                        <span class="text-[10px] font-bold text-primary uppercase tracking-widest">Plato N#${i}</span>
                        <h3 id="title-${id}" data-db contenteditable="true" class="text-xl font-black text-secondary mt-1 font-serif">Nombre del Plato</h3>
                        <p id="desc-${id}" data-db contenteditable="true" class="text-gray-500 mt-2 text-sm italic border-t pt-2 border-gray-50">
                            Ingredientes y descripción...
                        </p>
                    </div>
                </div>`;
        }
        loadData();
    }

    function showCategory(cat) {
        currentCat = cat;
        render();
    }

    render();
</script>
</body>
</html>
