<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plato Cocina y se Divierte | IED María Alfaro de Ospino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#E9723A', secondary: '#133959', neutralBg: '#F9F5F1', pTag: '#AE8B69' },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .tab-btn { transition: all 0.3s ease; border-bottom: 4px solid transparent; padding-bottom: 8px; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        .tab-active { border-bottom: 4px solid #E9723A !important; color: #E9723A !important; }
        [contenteditable="true"]:focus { outline: none; background: #fff7ed; border-radius: 8px; padding: 2px 5px; }
    </style>
</head>
<body class="bg-neutralBg min-h-screen pb-40 font-sans">

<header class="py-10 text-center px-4 max-w-6xl mx-auto border-b border-gray-200">
    <div class="inline-flex items-center gap-2 border border-gray-200 bg-white rounded-full px-4 py-1.5 shadow-sm mb-6 text-sm font-semibold tracking-wide text-pTag">
        <span class="w-2.5 h-2.5 rounded-full bg-pTag"></span> MAGDALENA · COLOMBIA
    </div>
    <h1 class="text-4xl md:text-5xl font-black text-secondary leading-tight max-w-4xl mx-auto mb-4">
        Institución Educativa Técnica Departamental <span class="block text-[#C2410C]">“María Alfaro de Ospino”</span>
    </h1>
    <p class="text-gray-500 text-xs tracking-widest uppercase font-bold">Aprobada según resolución No. 1334 de noviembre 29 de 2023</p>
</header>

<section class="bg-primary pt-16 pb-24 px-6">
    <div class="max-w-6xl mx-auto text-center">
        <div class="inline-block bg-white/20 border border-white/30 text-white rounded-full px-5 py-2.5 font-bold uppercase tracking-widest text-xs mb-8">PROYECTO CULTURAL</div>
        <h2 class="text-6xl md:text-8xl font-black text-white leading-tight font-serif mb-4 tracking-tighter">
            Plato cocina <span class="block text-secondary text-5xl md:text-6xl">y se divierte</span>
        </h2>
    </div>
</section>

<nav class="bg-white sticky top-0 z-50 shadow-md border-b-2 border-primary mt-[-40px] rounded-t-3xl max-w-6xl mx-auto">
    <div class="flex justify-center gap-6 md:gap-12 p-6">
        <button onclick="showCategory('salados')" id="btn-salados" class="tab-btn tab-active text-base md:text-lg">🥘 Salados</button>
        <button onclick="showCategory('postres')" id="btn-postres" class="tab-btn text-base md:text-lg">🍰 Postres</button>
        <button onclick="showCategory('bebidas')" id="btn-bebidas" class="tab-btn text-base md:text-lg">🍹 Bebidas</button>
    </div>
</nav>

<main id="container" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12 max-w-6xl"></main>

<div class="fixed bottom-8 right-8 z-50">
    <button onclick="saveAll()" class="bg-secondary hover:bg-black text-white font-black text-sm px-10 py-5 rounded-2xl shadow-2xl transition-all active:scale-90 flex items-center gap-3">
        <span class="text-xl">💾</span> GUARDAR CAMBIOS EN LA NUBE
    </button>
</div>

<script>
    // CREDENCIALES SUPABASE
    const SB_URL = 'https://sexadxzqssmhvbzjtupd.supabase.co';
    const SB_KEY = 'sb_publishable_iV2bAQ3LGo1NbaWG-gdSRg_Z9uWuLeE'; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentCat = 'salados';
    const config = { salados: 40, postres: 30, bebidas: 30 };

    // Cargar datos guardados
    async function loadData() {
        const { data, error } = await _supabase.from('menu_platos').select('*');
        if (data) {
            data.forEach(item => {
                const el = document.getElementById(item.id_plato);
                if (el) {
                    if (el.tagName === 'IMG') {
                        el.src = item.contenido || 'https://via.placeholder.com/400?text=Pega+Link+Aqui';
                    } else {
                        el.innerText = item.contenido;
                    }
                }
            });
        }
    }

    // Guardar todo
    async function saveAll() {
        const elements = document.querySelectorAll('[data-db]');
        const updates = Array.from(elements).map(el => ({
            id_plato: el.id,
            contenido: el.tagName === 'IMG' ? el.src : el.innerText
        }));

        const { error } = await _supabase.from('menu_platos').upsert(updates);
        if (!error) {
            alert("¡Éxito! El menú de 'Plato cocina y se divierte' ha sido actualizado para todos.");
        } else {
            alert("Error al conectar con la base de datos.");
        }
    }

    // Cambiar imagen al pegar link
    function updateImage(id, url) {
        if(url.trim() !== "") {
            document.getElementById(id).src = url;
        }
    }

    // LÓGICA DE LA BARRA DE NAVEGACIÓN
    function showCategory(cat) {
        currentCat = cat;

        // Resetear todos los botones
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('tab-active');
        });

        // Activar el botón clicado
        const selectedBtn = document.getElementById(`btn-${cat}`);
        if (selectedBtn) {
            selectedBtn.classList.add('tab-active');
        }

        // Renderizar nuevos platos
        render();
    }

    // Dibujar las tarjetas
    function render() {
        const cont = document.getElementById('container');
        cont.innerHTML = '';
        const limit = config[currentCat];

        for (let i = 1; i <= limit; i++) {
            const id = `${currentCat}-${i}`;
            cont.innerHTML += `
                <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden hover:shadow-2xl transition-all duration-300">
                    <div class="relative h-56 bg-gray-200 group">
                        <img id="img-${id}" data-db src="https://via.placeholder.com/400?text=Sin+Imagen" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center p-4">
                            <input type="text" placeholder="Pega link de imagen aquí..." 
                                   onchange="updateImage('img-${id}', this.value)"
                                   class="w-full p-2 rounded-lg text-xs font-bold border-none shadow-lg">
                        </div>
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-primary uppercase tracking-[0.2em]">${currentCat}</span>
                            <span class="text-[10px] font-bold text-gray-300 italic">#${i}</span>
                        </div>
                        <h3 id="title-${id}" data-db contenteditable="true" class="text-2xl font-black text-secondary leading-tight font-serif tracking-tighter">Nombre del Plato</h3>
                        <p id="desc-${id}" data-db contenteditable="true" class="text-gray-500 mt-4 text-sm italic border-t pt-4 border-gray-50 leading-relaxed">
                            Escribe aquí los ingredientes o una descripción divertida...
                        </p>
                    </div>
                </div>`;
        }
        loadData();
    }

    // Iniciar
    render();
</script>
</body>
</html>
